<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ayu Nadia — Portfolio</title>
<script src="https://elfsightcdn.com/platform.js" async></script>
<style>
  :root{--bg:#fff;--ink:#111;--muted:#888;--line:#e5e5e5;--ph1:#f4f4f4;--maxw:1280px;--gap:clamp(10px,1.6vw,18px)}
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--ink);font-family:-apple-system,"Helvetica Neue",Helvetica,Arial,sans-serif;font-size:13px;line-height:1.5;-webkit-font-smoothing:antialiased}
  .wrap{max-width:var(--maxw);margin:0 auto;padding:0 clamp(16px,3vw,36px)}
  .head{padding:24px 0 18px;border-bottom:1px solid var(--line)}
  .head-meta{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:18px;gap:12px;flex-wrap:wrap}
  .label{font-size:11px;letter-spacing:.28em;text-transform:uppercase;color:var(--muted)}
  .name{font-size:clamp(24px,5vw,40px);letter-spacing:.18em;text-transform:uppercase;font-weight:500;line-height:1}
  .stats{display:flex;flex-wrap:wrap;gap:4px 28px;padding:14px 0;border-bottom:1px solid var(--line);font-size:11px;letter-spacing:.1em;text-transform:uppercase}
  .stats span{color:var(--muted)}
  .stats b{color:var(--ink);font-weight:500;margin-left:5px}
  .tabs{display:flex;gap:28px;padding:15px 0;border-bottom:1px solid var(--line);position:sticky;top:0;background:var(--bg);z-index:30;flex-wrap:wrap}
  .tab{background:none;border:none;cursor:pointer;font:inherit;font-size:12px;letter-spacing:.2em;text-transform:uppercase;color:var(--muted);padding:4px 0;position:relative;transition:color .15s}
  .tab[aria-selected="true"]{color:var(--ink)}
  .tab[aria-selected="true"]::after{content:"";position:absolute;left:0;right:0;bottom:-16px;height:1px;background:var(--ink)}
  .tab:focus-visible{outline:2px solid var(--ink);outline-offset:3px}
  .panel{padding:28px 0 72px}
  .panel[hidden]{display:none}
  .col-grid{columns:3 260px;column-gap:var(--gap)}
  .col-grid figure{break-inside:avoid;margin-bottom:var(--gap)}
  .dig-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:var(--gap);align-items:start}
  .tile img{width:100%;height:auto;display:block}
  .tile{overflow:hidden;background:var(--ph1)}
  figcaption{padding:7px 0 4px;font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:var(--muted)}
  figcaption .desc{font-size:10px;letter-spacing:.1em;text-transform:none;color:var(--muted);margin-top:2px;font-style:italic}
  .ig-head{display:flex;align-items:center;gap:10px;margin-bottom:18px;font-size:12px;letter-spacing:.12em;text-transform:uppercase}
  .ig-head a{color:var(--ink);text-decoration:none;border-bottom:1px solid var(--line)}
  .ig-head a:hover{border-color:var(--ink)}
  footer{border-top:1px solid var(--line);padding:28px 0 52px;font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);display:flex;flex-wrap:wrap;gap:10px 32px;align-items:center}
  footer a{color:var(--ink);text-decoration:none;border-bottom:1px solid var(--line)}
  footer a:hover{border-color:transparent}
  @media(max-width:540px){.col-grid{columns:2 140px}.dig-grid{grid-template-columns:repeat(auto-fill,minmax(140px,1fr))}.tabs{gap:18px}}
</style>
</head>
<body>

<script>
  const tabs = Array.from(document.querySelectorAll('[role="tab"]'));
  function select(tab) {
    tabs.forEach(t => {
      const on = t === tab;
      t.setAttribute('aria-selected', on);
      document.getElementById(t.getAttribute('aria-controls')).hidden = !on;
    });
  }
  tabs.forEach((tab, i) => {
    tab.addEventListener('click', () => select(tab));
    tab.addEventListener('keydown', e => {
      if (e.key === 'ArrowRight' || e.key === 'ArrowLeft') {
        e.preventDefault();
        const dir = e.key === 'ArrowRight' ? 1 : -1;
        const next = tabs[(i + dir + tabs.length) % tabs.length];
        next.focus(); select(next);
      }
    });
  });
</script>
